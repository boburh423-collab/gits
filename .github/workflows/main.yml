name: Android APK Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodni yuklab olish
        uses: actions/checkout@v4

      - name: JDK 17 o'rnatish
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: gradlew ruxsatini berish
        run: chmod +x gradlew

      # ✅ wrapper.properties ni e'tiborsiz qoldirib, to'g'ridan Gradle 8.5 o'rnatish
      - name: Gradle 8.5 o'rnatish (majburiy)
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'

      - name: wrapper.properties ni tekshirish (debug)
        run: cat gradle/wrapper/gradle-wrapper.properties

      - name: APK build
        run: gradle assembleDebug --no-daemon --warning-mode all

      - name: APK ni saqlash
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: GitHub Release (faqat tag push da)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
